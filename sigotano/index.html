<!DOCTYPE html>
<html lang="ja" data-palette="clay" data-headfont="mincho">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>しごたの ｜ 仕事を楽しくするビジネスマインド</title>
  <meta name="description" content="駆け出しフリーランスのための、一人ひとりに寄り添うビジネス成長支援サービス。マインドづくりからチーム化、ロードマップまで伴走します。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/sections.css" />
  <link rel="stylesheet" href="css/sections-2.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    /* Tweaks: tone swatch controls */
    .tone-swatches { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tone-chip { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 11px;
      border: 1.5px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); transition: all .2s; text-align: left; }
    .tone-chip:hover { border-color: rgba(255,255,255,.28); }
    .tone-chip.on { border-color: #fff; background: rgba(255,255,255,.12); }
    .tone-sw { display: inline-flex; border-radius: 6px; overflow: hidden; flex: none; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .tone-sw i { width: 13px; height: 26px; display: block; }
    .tone-label { display: flex; flex-direction: column; line-height: 1.2; }
    .tone-label b { font-size: 12.5px; color: #fff; font-weight: 600; }
    .tone-label em { font-style: normal; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; opacity: .6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="js/data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="js/components.jsx"></script>
  <script type="text/babel" src="js/sections-a.jsx"></script>
  <script type="text/babel" src="js/sections-b.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
